name: Publish VS Code Extension

on:
    release:
        types: [ published ]
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Dry run (package only, no publish)"
                required: false
                default: false
                type: boolean
            pre_release:
                description: "Publish as pre-release"
                required: false
                default: true
                type: boolean

defaults:
    run:
        working-directory: editors/vscode

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm ci

            - name: Compile
              run: npm run compile

            - name: Determine pre-release flag
              id: flags
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.pre_release }}" == "true" ]]; then
                    echo "pre_release=--pre-release" >> "$GITHUB_OUTPUT"
                  elif [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" == "true" ]]; then
                    echo "pre_release=--pre-release" >> "$GITHUB_OUTPUT"
                  else
                    echo "pre_release=" >> "$GITHUB_OUTPUT"
                  fi

            - name: Package extension
              run: npx @vscode/vsce package ${{ steps.flags.outputs.pre_release }}

            - name: Upload .vsix artifact
              uses: actions/upload-artifact@v4
              with:
                  name: blackbox-vsix
                  path: editors/vscode/*.vsix

            - name: Publish to VS Code Marketplace
              if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch'
                  && inputs.dry_run == false)
              run: npx @vscode/vsce publish ${{ steps.flags.outputs.pre_release }}
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Publish to Open VSX Registry
              if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch'
                  && inputs.dry_run == false)
              run: npx ovsx publish *.vsix
              env:
                  OVSX_PAT: ${{ secrets.OVSX_PAT }}
              continue-on-error: true
